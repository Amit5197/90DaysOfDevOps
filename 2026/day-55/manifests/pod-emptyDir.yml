apiVersion: v1
kind: Pod
metadata:
  name: pod-emptydir
spec:
  containers:
    - name: pod-emptydir
      image: busybox
      command: ["/bin/sh","-c",'echo "Timestamp: $(date)" > /data/message.txt; sleep 3600']
      volumeMounts:
        - name: emptydir-volume
          mountPath: /data
  volumes:
    - name: emptydir-volume
      emptyDir: {}
