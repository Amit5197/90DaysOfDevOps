apiVersion: v1
kind: Pod
metadata:
  name: nginx-config
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx-config-vol
          mountPath: /etc/nginx/conf.d
  volumes:
    - name: nginx-config-vol
      configMap:
        name: nginx-config
