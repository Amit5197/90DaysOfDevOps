apiVersion: v1
kind: Pod
metadata:
  name: busybox-secret
spec:
  containers:
  - name: busybox-secret
    image: busybox:latest
    command: ["sh", "-c", "echo 'User:' $(cat /etc/db-credentials/DB_USER) && echo 'Password:' $(cat /etc/db-credentials/DB_PASSWORD) && sleep 3600"]
    env:
      - name: DB_USER
        valueFrom:
          secretKeyRef:
            name: db-credentials
            key: DB_USER
    volumeMounts:
      - name: credentials
        mountPath: /etc/db-credentials
        readOnly: true
  volumes:
    - name: credentials
      secret:
        secretName: db-credentials
