apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
    volumeMounts:
      - name: nginx-config-volume
        mountPath: /etc/nginx/conf.d
        readOnly: true
  volumes:
    - name: nginx-config-volume
      configMap:
        name: nginx-config


