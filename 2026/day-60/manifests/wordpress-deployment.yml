apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: capstone
  labels:
    app: wordpress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:latest
          envFrom:
            - configMapRef:
                name: wordpress-config
          env:
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /wp-login.php
              port: 80
            initialDelaySeconds: 45    # 👈 CHANGED (Increased from 15 to 45 seconds)
            periodSeconds: 10          # 👈 CHANGED (Check every 10 seconds)
            timeoutSeconds: 5          # 👈 CHANGED (Timeout raised to 5 seconds)
            failureThreshold: 6        # 👈 ADDED (Allow 6 failed checks before restarting)
          readinessProbe:
            httpGet:
              path: /wp-login.php
              port: 80
            initialDelaySeconds: 30    # 👈 CHANGED (Increased from 15 to 30 seconds)
            periodSeconds: 10          # 👈 CHANGED (Check every 10 seconds)
            timeoutSeconds: 5          # 👈 CHANGED (Timeout raised to 5 seconds)
            failureThreshold: 6        # 👈 ADDED (Allow 6 failed checks)
