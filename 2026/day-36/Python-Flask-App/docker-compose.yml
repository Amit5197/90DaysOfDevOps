services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=devopsdb
      - DB_USER=devopsuser
      - DB_PASSWORD=supersecurepass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devops_network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=devopsuser
      - POSTGRES_PASSWORD=supersecurepass
      - POSTGRES_DB=devopsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devopsuser -d devopsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  devops_network:
    driver: bridge
